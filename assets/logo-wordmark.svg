    <circle cx="256" cy="256" r="238" fill="none" stroke="url(#gold)" stroke-width="6"/>

    <g fill="url(#gold)">
      <circle cx="235" cy="215" r="72"/>
      <ellipse cx="272" cy="262" rx="52" ry="78"/>
