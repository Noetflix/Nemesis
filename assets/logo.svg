<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" gradientUnits="userSpaceOnUse" cx="200" cy="180" r="330">
      <stop offset="0%" stop-color="#242142"/>
      <stop offset="55%" stop-color="#15132a"/>
      <stop offset="100%" stop-color="#0a0915"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d98b"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9c7a1e"/>
    </linearGradient>
  </defs>

  <!-- Fond circulaire (badge) -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#gold)" stroke-width="6"/>

  <!-- Casque grec (corinthien), profil tourné vers la droite : union de formes simples -->
  <g fill="url(#gold)">
    <!-- Dôme du crâne -->
    <circle cx="235" cy="215" r="72"/>
    <!-- Joue / face avant, forme ovale allongée -->
    <ellipse cx="272" cy="262" rx="52" ry="78"/>
    <!-- Pointe du couvre-menton -->
    <polygon points="240,325 300,320 268,360"/>
    <!-- Garde-nuque à l'arrière -->
    <ellipse cx="205" cy="248" rx="46" ry="58"/>
    <!-- Nasal (protège-nez) -->
    <rect x="292" y="228" width="16" height="78" rx="8"/>
    <!-- Crête / cimier au sommet -->
    <path d="M 150 148 C 190 108, 280 100, 330 132 C 300 118, 200 118, 195 180 Z"/>
  </g>

  <!-- Fente du regard (découpe dans la garde de joue) -->
  <ellipse cx="288" cy="233" rx="19" ry="9" transform="rotate(-18 288 233)" fill="url(#bg)"/>
</svg>
